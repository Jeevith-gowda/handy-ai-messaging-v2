<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <title>Offline — Handy It Out</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #ecfdf5 0%, #f8fafc 100%);
      color: #0f172a;
      padding: 1.5rem;
    }
    .card {
      max-width: 24rem;
      text-align: center;
      padding: 2rem;
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { margin: 0; color: #64748b; font-size: 0.875rem; line-height: 1.5; }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>You’re offline</h1>
    <p>Handy It Out needs a connection. Check your network and try again.</p>
  </div>
</body>
</html>
